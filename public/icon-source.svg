<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5c79a"/>
      <stop offset="100%" stop-color="#c19967"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#d4af7a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4af7a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 배경 (safe zone 고려: 외곽 16% padding) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  <!-- 키캡 -->
  <g transform="translate(140 140)">
    <rect x="4" y="14" width="224" height="208" rx="32" fill="#000" opacity="0.45"/>
    <rect x="0" y="0" width="232" height="208" rx="32" fill="url(#key)" stroke="#8b6f3a" stroke-width="2.5"/>
    <rect x="14" y="14" width="204" height="180" rx="22" fill="none" stroke="#8b6f3a" stroke-width="1.4" opacity="0.45"/>
    <!-- K 글자 -->
    <text x="116" y="146" font-family="Georgia, 'Times New Roman', serif" font-size="148" font-weight="700"
          fill="#1a1410" text-anchor="middle" letter-spacing="-2">K</text>
  </g>
</svg>
